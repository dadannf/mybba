# Nginx Configuration for MyBBA Production
# Copy this file to: /etc/nginx/sites-available/mybba

server {
    listen 80;
    listen [::]:80;
    
    # Ganti dengan domain Anda
    server_name yourdomain.com www.yourdomain.com;
    # Atau gunakan IP jika belum punya domain: server_name 123.45.67.89;
    
    # Document root
    root /var/www/mybba/public;
    index index.php index.html;
    
    # Logging
    access_log /var/log/nginx/mybba_access.log;
    error_log /var/log/nginx/mybba_error.log;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Upload size limit (sesuaikan dengan kebutuhan)
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    # Timeout settings
    fastcgi_read_timeout 300;
    
    # Main location
    location / {
        try_files $uri $uri/ =404;
    }
    
    # PHP processing
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Security
        fastcgi_param HTTP_PROXY "";
    }
    
    # Deny access to hidden files (except .well-known for Let's Encrypt)
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to config and sensitive files
    location ~ /(config\.php|\.env|composer\.(json|lock)|package\.json) {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Cache static files
    location ~* \.(jpg|jpeg|png|gif|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Prevent directory listing
    autoindex off;
}

